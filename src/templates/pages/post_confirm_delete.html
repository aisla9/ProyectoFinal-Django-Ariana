{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow-sm border-0 rounded-4 p-4 text-center">
        <h2 class="text-danger mb-3">¿Estás segura?</h2>
        <p class="fs-5">Estás a punto de borrar la publicación: <strong>"{{ post.titulo }}"</strong>.</p>
        <p class="text-muted mb-4">Esta acción no se puede deshacer.</p>

        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger px-4 mx-2">Sí, borrar definitivamente</button>
            <a href="{% url 'post_detail' post.pk %}" class="btn btn-outline-secondary px-4 mx-2">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
