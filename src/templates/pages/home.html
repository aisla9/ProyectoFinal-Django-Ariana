{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="row align-items-center py-5">
        <div class="col-lg-6 text-center text-lg-start">
            <h1 class="display-3 fw-bold mb-4">Bienvenido a <span class="text-primary">Mi Blog</span></h1>
            <p class="lead text-muted mb-5">
                Un espacio dedicado a explorar el mundo de la tecnología, 
                los negocios y la analítica de datos. 
                ¡Descubre contenido creado por estudiantes para el mundo!
            </p>
            <div class="d-grid gap-3 d-sm-flex justify-content-sm-center justify-content-lg-start">
                <a href="{% url 'post_list' %}" class="btn btn-primary btn-lg px-5 shadow">Ver Publicaciones</a>
                <a href="{% url 'about' %}" class="btn btn-outline-dark btn-lg px-4">Sobre mí</a>
            </div>
        </div>
        <div class="col-lg-6 d-none d-lg-block">
            <img src="https://images.unsplash.com/photo-1499750310107-5fef28a66643?q=80&w=1000" 
                 class="img-fluid rounded-5 shadow-lg" alt="Blog background">
        </div>
    </div>
</div>
{% endblock %}
