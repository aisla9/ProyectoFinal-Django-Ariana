{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0 rounded-4 p-4">
                <h2 class="text-center fw-bold mb-4">Cambiar Contraseña</h2>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-warning w-100 mt-3 py-2">Guardar Nueva Contraseña</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
