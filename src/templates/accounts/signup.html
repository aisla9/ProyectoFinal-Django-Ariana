{% extends 'base.html' %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow border-0 rounded-4">
                <div class="card-body p-5">
                    <h2 class="text-center fw-bold mb-4 text-dark">Crear Cuenta</h2>
                    
                    <form method="POST">
                        {% csrf_token %}
                        
                        {% for field in form %}
                            <div class="mb-3">
                                <label class="fw-bold text-secondary mb-1">
                                    {{ field.label }}
                                </label>
                                
                                {{ field }}
                                
                                {% for error in field.errors %}
                                    <div class="text-danger small fw-bold mt-1">{{ error }}</div>
                                {% endfor %}

                                {% if field.help_text %}
                                    <div class="form-text small text-muted lh-sm mt-1">
                                        {{ field.help_text|safe }}
                                    </div>
                                {% endif %}
                            </div>
                        {% endfor %}

                        <div class="d-grid mt-4 pt-2">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold">Registrarse</button>
                        </div>
                    </form>

                    <div class="text-center mt-4 pt-3 border-top">
                        <p class="text-muted mb-0">
                            ¿Ya tienes cuenta? 
                            <a href="{% url 'login' %}" class="text-decoration-none fw-bold text-primary">Inicia sesión</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
