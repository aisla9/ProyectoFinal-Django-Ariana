{% extends 'base.html' %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0 rounded-4 p-4">
                <h2 class="text-center fw-bold mb-4">Iniciar Sesión</h2>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary w-100 mt-3 py-2">Entrar</button>
                </form>
                <div class="text-center mt-4">
                    <small class="text-muted">¿No tienes cuenta? <a href="{% url 'signup' %}" class="text-decoration-none">Regístrate aquí</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
