{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0 rounded-4 p-4">
                <h2 class="fw-bold mb-4 text-center">Editar mi Perfil</h2>
                
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <h6 class="text-primary fw-bold">Información Personal</h6>
                    {{ u_form.as_p }}
                    
                    <hr>
                    
                    <h6 class="text-primary fw-bold">Avatar y Bio</h6>
                    {{ p_form.as_p }}

                    <div class="mt-4 d-grid gap-2">
                        <button type="submit" class="btn btn-success py-2">Actualizar Datos</button>
                        <a href="{% url 'profile' %}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
