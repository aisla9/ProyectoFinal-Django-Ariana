{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0 rounded-4 p-4">
                <h2 class="fw-bold mb-4 text-center">✉️ Nuevo Mensaje</h2>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Para:</label>
                        {{ form.receptor }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Mensaje:</label>
                        {{ form.contenido }}
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary py-2">Enviar Mensaje</button>
                        <a href="{% url 'inbox' %}" class="btn btn-outline-secondary">Volver al Inbox</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
